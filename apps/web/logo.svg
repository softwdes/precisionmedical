<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="highlightGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="135%">
      <feDropShadow dx="0" dy="10" stdDeviation="28" flood-color="#6366F1" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Outer dark background -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="url(#bgGrad)"/>

  <!-- Subtle border -->
  <rect x="3" y="3" width="1018" height="1018" rx="228" ry="228" fill="none" stroke="#6366F1" stroke-width="2.5" opacity="0.25"/>

  <!-- Main card with gradient -->
  <rect x="100" y="100" width="824" height="824" rx="190" ry="190" fill="url(#cardGrad)" filter="url(#softShadow)"/>

  <!-- Highlight overlay -->
  <rect x="100" y="100" width="824" height="412" rx="190" ry="190" fill="url(#highlightGrad)"/>
  <rect x="100" y="312" width="824" height="200" fill="url(#highlightGrad)"/>

  <!-- PM letters -->
  <text
    x="512"
    y="590"
    text-anchor="middle"
    font-family="Plus Jakarta Sans, Inter, sans-serif"
    font-size="340"
    font-weight="800"
    fill="white"
    opacity="0.97"
    letter-spacing="-8"
  >PM</text>
</svg>
